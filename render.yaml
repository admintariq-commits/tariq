services:
  - type: web
    name: tariq
    env: docker
    branch: main
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'true'
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: debug
      - key: APP_URL
        value: 'https://tariq-1nqr.onrender.com'
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: 'false'
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_DRIVER
        value: file
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: APP_KEY
        value: base64:7EXD3OMomubbovehVLk4WlGjzTkaZsULTBuJ8IcaL1U=
      - key: ADMIN_EMAIL
        value: 'admin@tariq.go.tz'
