databases:
  - name: tariq-db
    databaseName: tariq
    user: tariq
    plan: free

services:
  - type: web
    name: tariq
    env: docker
    branch: main
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug
      - key: APP_URL
        value: 'https://tariq-1nqr.onrender.com'
      - key: APP_KEY
        value: base64:7EXD3OMomubbovehVLk4WlGjzTkaZsULTBuJ8IcaL1U=
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: 'false'
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: ADMIN_EMAIL
        value: 'admin@tariq.go.tz'

      # ---- Database (PostgreSQL on Render) ----
      - key: DB_CONNECTION
        value: pgsql
      # Pull the connection details from the managed Postgres DB above.
      - key: DB_HOST
        fromDatabase:
          name: tariq-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tariq-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: tariq-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tariq-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tariq-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: tariq-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
